name: Cross-Platform Build & Package Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux Packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            rpm \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libx11-dev \
            libxi-dev \
            libxtst-dev \
            libxrandr-dev \
            libxcursor-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavfilter-dev \
            libavdevice-dev \
            libdav1d-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            patchelf \
            xdg-utils

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'pnpm'
          cache-dependency-path: |
            config/pnpm-lock.yaml
            pack-editor/pnpm-lock.yaml

      - name: Build Installer A (Main Suite)
        run: ./deploy/linux/build_installer_a.sh

      - name: Build Installer B (Pack Editor)
        run: ./deploy/linux/build_installer_b.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}-installers
          path: dist/*

  build-macos:
    name: Build macOS Packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-latest
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install brew dependencies
        run: |
          brew update
          brew install ffmpeg dav1d
          echo "BREW_DEPS=$(brew ls --versions ffmpeg dav1d | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          env-vars: BREW_DEPS

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'pnpm'
          cache-dependency-path: |
            config/pnpm-lock.yaml
            pack-editor/pnpm-lock.yaml

      - name: Build Installer A (Main Suite)
        run: ./deploy/macos/build_installer_a.sh

      - name: Build Installer B (Pack Editor)
        run: ./deploy/macos/build_installer_b.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}-installers
          path: dist/*

  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup MSVC
        uses: step-security/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg
        uses: actions/cache@v5
        with:
          path: |
            vcpkg
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "vcpkg")) {
            git clone https://github.com/Microsoft/vcpkg.git
            cd vcpkg
            .\bootstrap-vcpkg.bat
            cd ..
          }
          echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV

      - name: Install FFmpeg and dav1d via vcpkg
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install pkgconf:x64-windows-release
          & "$env:VCPKG_ROOT\vcpkg.exe" install dav1d:x64-windows-release
          & "$env:VCPKG_ROOT\vcpkg.exe" install ffmpeg:x64-windows-release

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup environment
        shell: pwsh
        run: |
          echo "FFMPEG_DIR=${{ github.workspace }}\vcpkg\installed\x64-windows-release" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows-release\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "${{ github.workspace }}\vcpkg\installed\x64-windows-release\tools\pkgconf" >> $env:GITHUB_PATH
          echo "PKG_CONFIG=${{ github.workspace }}\vcpkg\installed\x64-windows-release\tools\pkgconf\pkgconf.exe" >> $env:GITHUB_ENV

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'pnpm'
          cache-dependency-path: |
            config/pnpm-lock.yaml
            pack-editor/pnpm-lock.yaml

      - name: Build Installer A (Main Suite)
        shell: pwsh
        run: ./deploy/windows/build_installer_a.ps1

      - name: Build Installer B (Pack Editor)
        shell: pwsh
        run: ./deploy/windows/build_installer_b.ps1

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-installers
          path: dist/*

  release-assets:
    name: Upload Assets to GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage files for release
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          echo "=== Staged files for release ==="
          ls -R release-files

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-manifests:
    name: Generate Download Manifests
    needs: [release-assets]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Generate manifests
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          python3 -c "
          import json, sys
          version, base, pub_date = sys.argv[1], sys.argv[2], sys.argv[3]

          with open('docs/src/data/latest.json', 'w') as f:
            json.dump({
              'version': version,
              'pub_date': pub_date,
              'download_page': 'https://lewdware.net/download/',
              'assets': {
                'windows-x64': f'{base}/lewdware_{version}_x86_64.exe',
                'macos-arm64': f'{base}/lewdware_{version}_arm64.pkg',
                'macos-x64': f'{base}/lewdware_{version}_x86_64.pkg',
                'linux-x64-deb': f'{base}/lewdware_{version}_x86_64.deb',
                'linux-x64-rpm': f'{base}/lewdware_{version}_x86_64.rpm',
                'linux-x64-tar': f'{base}/lewdware_{version}_x86_64.tar.gz',
                'linux-arm64-deb': f'{base}/lewdware_{version}_arm64.deb',
                'linux-arm64-rpm': f'{base}/lewdware_{version}_arm64.rpm',
                'linux-arm64-tar': f'{base}/lewdware_{version}_arm64.tar.gz',
              },
            }, f, indent=2)
            f.write('\n')

          with open('docs/src/data/pack-editor-latest.json', 'w') as f:
            json.dump({
              'version': version,
              'pub_date': pub_date,
              'download_page': 'https://lewdware.net/download/pack-editor',
              'assets': {
                'windows-x64': f'{base}/lewdware-pack-editor_{version}_x86_64.msi',
                'macos-arm64': f'{base}/lewdware-pack-editor_{version}_arm64.dmg',
                'macos-x64': f'{base}/lewdware-pack-editor_{version}_x86_64.dmg',
                'linux-x64-deb': f'{base}/lewdware-pack-editor_{version}_x86_64.deb',
                'linux-x64-rpm': f'{base}/lewdware-pack-editor_{version}_x86_64.rpm',
                'linux-x64-appimage': f'{base}/lewdware-pack-editor_{version}_x86_64.AppImage',
                'linux-arm64-deb': f'{base}/lewdware-pack-editor_{version}_arm64.deb',
                'linux-arm64-rpm': f'{base}/lewdware-pack-editor_{version}_arm64.rpm',
                'linux-arm64-appimage': f'{base}/lewdware-pack-editor_{version}_arm64.AppImage',
              },
            }, f, indent=2)
            f.write('\n')
          " "$VERSION" "$BASE" "$PUB_DATE"

      - name: Commit manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/src/data/latest.json docs/src/data/pack-editor-latest.json
          git diff --staged --quiet || git commit -m "Update download manifests for ${{ github.ref_name }} [skip ci]"
          git push

  deploy-docs:
    name: Deploy Docs to Cloudflare Pages
    needs: [generate-manifests]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'pnpm'
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Build docs
        run: cd docs && pnpm install && pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/dist --project-name=lewdware --branch=main
