name: Cross-Platform Build & Package Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux Packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            rpm \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libx11-dev \
            libxi-dev \
            libxtst-dev \
            libxrandr-dev \
            libxcursor-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavfilter-dev \
            libavdevice-dev \
            libdav1d-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            patchelf \
            xdg-utils

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'pnpm'
          cache-dependency-path: |
            config/pnpm-lock.yaml
            pack-editor/pnpm-lock.yaml

      - name: Build Installer A (Main Suite)
        run: ./deploy/linux/build_installer_a.sh

      - name: Build Installer B (Pack Editor)
        run: ./deploy/linux/build_installer_b.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}-installers
          path: dist/*

  build-macos:
    name: Build macOS Packages (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install brew dependencies
        run: |
          brew update
          brew install ffmpeg dav1d

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'pnpm'
          cache-dependency-path: |
            config/pnpm-lock.yaml
            pack-editor/pnpm-lock.yaml

      - name: Build Installer A (Main Suite)
        run: ./deploy/macos/build_installer_a.sh

      - name: Build Installer B (Pack Editor)
        run: ./deploy/macos/build_installer_b.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-installers
          path: dist/*

  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg
        uses: actions/cache@v5
        with:
          path: |
            vcpkg
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "vcpkg")) {
            git clone https://github.com/Microsoft/vcpkg.git
            cd vcpkg
            .\bootstrap-vcpkg.bat
            cd ..
          }
          echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV

      - name: Install FFmpeg and dav1d via vcpkg
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install pkgconf:x64-windows-release
          & "$env:VCPKG_ROOT\vcpkg.exe" install dav1d:x64-windows-release
          & "$env:VCPKG_ROOT\vcpkg.exe" install ffmpeg:x64-windows-release

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup environment
        shell: pwsh
        run: |
          echo "FFMPEG_DIR=${{ github.workspace }}\vcpkg\installed\x64-windows-release" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows-release\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "${{ github.workspace }}\vcpkg\installed\x64-windows-release\tools\pkgconf" >> $env:GITHUB_PATH
          echo "PKG_CONFIG=${{ github.workspace }}\vcpkg\installed\x64-windows-release\tools\pkgconf\pkgconf.exe" >> $env:GITHUB_ENV

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'pnpm'
          cache-dependency-path: |
            config/pnpm-lock.yaml
            pack-editor/pnpm-lock.yaml

      - name: Build Installer A (Main Suite)
        shell: pwsh
        run: ./deploy/windows/build_installer_a.ps1

      - name: Build Installer B (Pack Editor)
        shell: pwsh
        run: ./deploy/windows/build_installer_b.ps1

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-installers
          path: dist/*

  release-assets:
    name: Upload Assets to GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage files for release
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          echo "=== Staged files for release ==="
          ls -R release-files

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
